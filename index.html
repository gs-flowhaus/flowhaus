<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowhaus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f4f0;
      color: #0a0a0a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(3.5rem, 12vw, 10rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 0.92;
    }

    p {
      margin-top: 2rem;
      font-size: 1.1rem;
      color: #666;
      max-width: 400px;
    }

    footer {
      padding: 2rem;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <header>Flowhaus</header>

  <main>
    <h1>Coming<br />soon.</h1>
    <p>Something is in the works. Get in touch: <a href="mailto:hello@flowhaus.tech">hello@flowhaus.tech</a></p>
  </main>

  <footer>&copy; 2026 Flowhaus</footer>
</body>
</html>
